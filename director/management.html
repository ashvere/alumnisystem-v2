<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Management - WVSU</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <img class="brand-logo" src="/wvsulogo.png" alt="WVSU logo" />
        <span>WVSU Alumni Tracker</span>
      </div>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="management.html" class="active">Management</a>
        <button id="logoutBtn" class="nav-logout">Logout</button>
      </div>
    </nav>

    <main class="management-container">
      <div class="filters-bar glass-card">
        <select id="yearFilter">
          <option value="">All Years</option>
        </select>
        <select id="courseFilter">
          <option value="">All Courses</option>
        </select>
        <select id="employmentFilter">
          <option value="">All Employment</option>
          <option value="Employed">Employed</option>
          <option value="Unemployed">Unemployed</option>
          <option value="Self-Employed">Self-Employed</option>
          <option value="Abroad">Abroad</option>
        </select>
        <select id="cityFilter">
          <option value="">All Cities</option>
        </select>
        <select id="companyFilter">
          <option value="">All Companies</option>
        </select>
        <select id="batchFilter">
          <option value="">All Batches</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search alumni..." />
        <button id="resetFilters" class="btn-secondary">Reset</button>
      </div>

      <div class="report-buttons">
        <button id="exportPDF" class="btn-report">
          <i data-lucide="file-text" aria-hidden="true"></i>
          Export PDF
        </button>
        <button id="exportExcel" class="btn-report">
          <i data-lucide="sheet" aria-hidden="true"></i>
          Export Excel
        </button>
      </div>

      <div class="table-container glass-card">
        <table id="alumniTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Graduation Year</th>
              <th>Course</th>
              <th>Batch</th>
              <th>Employment</th>
              <th>Company</th>
              <th>City</th>
              <th>Location</th>
            </tr>
          </thead>
          <tbody id="alumniTableBody">
            <tr><td colspan="8">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination"></div>
    </main>

    <script type="module" src="/src/management.js"></script>
  </body>
</html>
