<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Dashboard - WVSU Alumni</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <img class="brand-logo" src="/wvsulogo.png" alt="WVSU logo" />
        <span>WVSU Alumni Tracker</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard/department.html" class="active">Dashboard</a>
        <a href="/shared/alumni-management.html">Management</a>
        <button id="logoutBtn" class="nav-logout">Logout</button>
      </div>
    </nav>

    <main class="dashboard-container">
      <div class="stats-grid">
        <div class="stat-card glass-card">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="graduation-cap"></i></div>
            <h3>Program Alumni</h3>
          </div>
          <p id="programAlumni">0</p>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="briefcase-business"></i></div>
            <h3>Program Employment Rate</h3>
          </div>
          <p id="programEmploymentRate">0%</p>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="file-up"></i></div>
            <h3>Program Documents</h3>
          </div>
          <p id="programDocs">0</p>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card glass-card">
          <h3>Program Alumni per Year</h3>
          <canvas id="yearlyChart"></canvas>
        </div>
        <div class="chart-card glass-card">
          <h3>Program Employment Status</h3>
          <canvas id="employmentChart"></canvas>
        </div>
      </div>
    </main>

    <script type="module" src="/src/auth.js"></script>
    <script type="module" src="/src/dashboard-limited.js"></script>
  </body>
</html>
