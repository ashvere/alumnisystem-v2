<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Dashboard - WVSU Alumni</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <img class="brand-logo" src="/wvsulogo.png" alt="WVSU logo" />
        <span>WVSU Alumni Tracker</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard/registrar.html" class="active">Dashboard</a>
        <a href="/shared/alumni-management.html">Management</a>
        <button id="logoutBtn" class="nav-logout">Logout</button>
      </div>
    </nav>

    <main class="dashboard-container">
      <div class="stats-grid">
        <div class="stat-card glass-card clickable-card" id="registrarRecordsCard" role="button" tabindex="0">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="file-text"></i></div>
            <h3>Records Uploaded</h3>
          </div>
          <p id="recordsUploaded">0</p>
        </div>
        <div class="stat-card glass-card clickable-card" id="registrarVerifiedCard" role="button" tabindex="0">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="badge-check"></i></div>
            <h3>Verified Docs</h3>
          </div>
          <p id="verifiedDocs">0</p>
        </div>
        <div class="stat-card glass-card clickable-card" id="registrarTotalAlumniCard" role="button" tabindex="0">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="users"></i></div>
            <h3>Total Alumni</h3>
          </div>
          <p id="totalAlumni">0</p>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card glass-card">
          <h3>Graduation Year Distribution</h3>
          <canvas id="yearlyChart"></canvas>
        </div>
      </div>
    </main>

    <script type="module" src="/src/auth.js"></script>
    <script type="module" src="/src/dashboard-limited.js"></script>
  </body>
</html>
