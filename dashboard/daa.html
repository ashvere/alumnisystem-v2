<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAA Dashboard - WVSU Alumni</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <img class="brand-logo" src="/wvsulogo.png" alt="WVSU logo" />
        <span>WVSU Alumni Tracker</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard/daa.html" class="active">Dashboard</a>
        <a href="/shared/alumni-management.html">Management</a>
        <button id="logoutBtn" class="nav-logout">Logout</button>
      </div>
    </nav>

    <main class="dashboard-container">
      <div class="stats-grid">
        <div class="stat-card glass-card clickable-card" id="daaTotalAlumniCard" role="button" tabindex="0">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="users"></i></div>
            <h3>Total Alumni</h3>
          </div>
          <p id="totalAlumni">0</p>
        </div>
        <div class="stat-card glass-card clickable-card" id="daaProgramsCard" role="button" tabindex="0">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true">
              <i data-lucide="graduation-cap"></i>
            </div>
            <h3>Programs Tracked</h3>
          </div>
          <p id="programsTracked">0</p>
        </div>
        <div class="stat-card glass-card clickable-card" id="daaDocsCard" role="button" tabindex="0">
          <div class="stat-top">
            <div class="stat-icon" aria-hidden="true"><i data-lucide="file-check"></i></div>
            <h3>Documents</h3>
          </div>
          <p id="docsCount">0</p>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card glass-card">
          <h3>Alumni per Graduation Year</h3>
          <canvas id="yearlyChart"></canvas>
        </div>
        <div class="chart-card glass-card">
          <h3>Employment Status</h3>
          <canvas id="employmentChart"></canvas>
        </div>
      </div>
    </main>

    <script type="module" src="/src/auth.js"></script>
    <script type="module" src="/src/dashboard-limited.js"></script>
  </body>
</html>
