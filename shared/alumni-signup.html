<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Sign Up - WVSU</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="login-body">
    <div class="login-container glass-card signup-shell">
      <div class="login-header signup-header">
        <img class="login-logo" src="/wvsulogo.png" alt="WVSU logo" />
        <h1>Sign up</h1>
        <p>Create your alumni profile in one minute.</p>
      </div>

      <div class="signup-stepper" aria-label="Sign up steps">
        <div class="signup-step active" id="step1Pill">
          <span class="signup-step-num">1</span>
          <span class="signup-step-label">Verify email</span>
        </div>
        <div class="signup-step" id="step2Pill">
          <span class="signup-step-num">2</span>
          <span class="signup-step-label">Profile</span>
        </div>
      </div>

      <section class="signup-stage glass-card" id="step1">
        <div class="signup-stage-title">Verify your email</div>
        <p class="signup-stage-sub">We’ll send a link to confirm it’s really you.</p>

        <div class="signup-email-inline">
          <input
            type="email"
            id="signupEmail"
            class="signup-email-input"
            placeholder="yourname@gmail.com"
            autocomplete="email"
          />
          <button type="button" class="btn-secondary" id="sendVerifyBtn">Send</button>
        </div>

        <div class="signup-status muted" id="verifyStatus"></div>
        <div class="verified-badge" id="verifiedBadge" aria-hidden="true" style="display:none;">
          <span class="checkmark">
            <span class="checkmark-stem"></span>
            <span class="checkmark-kick"></span>
          </span>
          Verified
        </div>

        <div class="signup-bottom">
          <a href="/index.html" class="signup-back">Back to login</a>
          <button type="button" class="btn-primary" id="continueBtn" disabled>Continue</button>
        </div>
      </section>

      <section class="signup-stage glass-card" id="step2" style="display:none;">
        <div class="signup-stage-title">Create your profile</div>
        <p class="signup-stage-sub">Fill out the required fields to complete sign up.</p>

        <div class="signup-status muted" id="signupStatus"></div>

        <form id="alumniSignupForm">
          <div class="form-row">
            <div class="form-group">
              <label>Student ID</label>
              <input type="text" id="signupStudentId" placeholder="2026-0001-PC" required />
            </div>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="signupFullName" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Graduation Year</label>
              <input type="number" id="signupGradYear" required />
            </div>
            <div class="form-group">
              <label>Course</label>
              <input type="text" id="signupCourse" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Contact Number</label>
              <input type="text" id="signupContact" />
            </div>
            <div class="form-group">
              <label>Employment Status</label>
              <select id="signupEmployment">
                <option value="">—</option>
                <option value="Employed">Employed</option>
                <option value="Unemployed">Unemployed</option>
                <option value="Self-Employed">Self-Employed</option>
                <option value="Abroad">Abroad</option>
                <option value="Further Studies">Further Studies</option>
              </select>
            </div>
          </div>

          <div class="form-actions signup-actions">
            <button type="button" class="btn-report" id="backToStep1Btn">Back</button>
            <button type="submit" class="btn-primary" id="completeSignupBtn" disabled>
              Complete sign up
            </button>
          </div>
        </form>
      </section>
    </div>

    <script type="module" src="/src/alumni-signup.js"></script>
  </body>
</html>
