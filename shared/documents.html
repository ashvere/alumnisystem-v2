<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents - WVSU Alumni</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <img class="brand-logo" src="/wvsulogo.png" alt="WVSU logo" />
        <span>WVSU Alumni Tracker</span>
      </div>
      <div class="nav-links">
        <a href="#" id="dashboardLink">Dashboard</a>
        <a href="/shared/alumni-management.html">Management</a>
        <a href="/shared/events.html">Events</a>
        <a href="/shared/documents.html" class="active">Documents</a>
        <button id="logoutBtn" class="nav-logout">Logout</button>
      </div>
    </nav>

    <main class="management-container">
      <div class="action-bar">
        <div>
          <strong>Documents</strong>
          <span class="muted" id="docsSubtitle"></span>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
          <button id="seedDocsBtn" class="btn-report" type="button" style="display:none;">
            <i data-lucide="sparkles" aria-hidden="true"></i>
            Create sample documents
          </button>
          <button id="printDocsBtn" class="btn-report" type="button">
            <i data-lucide="printer" aria-hidden="true"></i>
            Print
          </button>
        </div>
      </div>

      <div class="filters-bar glass-card">
        <select id="docTypeFilter">
          <option value="">All Types</option>
          <option value="Photo">Photo</option>
          <option value="IUIS">IUIS</option>
          <option value="Transcript">Transcript</option>
          <option value="Diploma">Diploma</option>
          <option value="Employment Certificate">Employment Certificate</option>
          <option value="Other">Other</option>
        </select>
        <input type="text" id="docSearch" placeholder="Search documents..." />
        <button id="refreshDocs" class="btn-secondary" type="button">Refresh</button>
      </div>

      <div class="table-container glass-card">
        <table id="docsTable">
          <thead>
            <tr>
              <th>Type</th>
              <th>File</th>
              <th>Academic Year</th>
              <th>Semester</th>
              <th>Size</th>
              <th>Uploaded</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody id="docsTbody">
            <tr><td colspan="7">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

    <script type="module" src="/src/auth.js"></script>
    <script type="module" src="/src/documents.js"></script>
  </body>
</html>
